  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>

<!-- Service Worker 등록 (body 끝부분에만 존재해야 함) -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js')
        .then(reg => console.log('SW registered', reg))
        .catch(err => console.log('SW registration failed', err));
    });
  }
</script>

</body>
</html>
<style>
:root {
  /* 텍스트 */
  --color-text-primary: #4A4A4A;      /* 부드러운 진회색 */
  --color-text-secondary: #7D7D7D;    /* 연한 회색 */
  --color-text-tertiary: #B5B5B5;     /* 더 연한 회색 */

  /* 배경 */
  --color-background-primary: #FFFFFF; /* 기본 흰색 */
  --color-background-secondary: #F7F4FA; /* 연보라 파스텔 */

  /* 테두리 */
  --color-border-primary: #C8B8E8;     /* 연보라 */
  --color-border-secondary: #E3DDF2;   /* 더 연한 보라 */
  --color-border-tertiary: #F0ECF8;    /* 거의 흰색에 가까운 보라 */

  /* 폰트 */
  --font-sans: "Noto Sans KR", sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap { padding: 1.5rem 0; max-width: 700px; margin: 0 auto; font-family: var(--font-sans); }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 10px; }
.title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
.date-nav { display: flex; align-items: center; gap: 8px; }
.date-label { font-size: 13px; font-weight: 500; color: var(--color-text-primary); min-width: 110px; text-align: center; }
.nav-btn, .today-btn { background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: 8px; padding: 4px 10px; font-size: 13px; color: var(--color-text-secondary); cursor: pointer; font-family: var(--font-sans); }
.nav-btn:hover, .today-btn:hover { background: var(--color-background-secondary); }
.tab-bar { display: flex; gap: 4px; margin-bottom: 1.25rem; border-bottom: 0.5px solid var(--color-border-tertiary); }
.tab { padding: 8px 16px; font-size: 13px; color: var(--color-text-secondary); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: var(--font-sans); background: transparent; border-top: none; border-left: none; border-right: none; }
.tab.active { color: #0F6E56; border-bottom-color: #1D9E75; font-weight: 500; }
.tab:hover:not(.active) { color: var(--color-text-primary); }
.page { display: none; }
.page.active { display: block; }
.week-strip { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 5px; margin-bottom: 1.25rem; }
.week-day { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 7px 2px; border-radius: 8px; cursor: pointer; border: 0.5px solid transparent; }
.week-day.active { border-color: #1D9E75; background: #E1F5EE; }
.week-day:hover:not(.active) { background: var(--color-background-secondary); }
.wd-name { font-size: 11px; color: var(--color-text-secondary); }
.wd-num { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.wd-dot { width: 5px; height: 5px; border-radius: 50%; background: transparent; }
.wd-dot.has { background: #1D9E75; }
.week-day.active .wd-name, .week-day.active .wd-num { color: #0F6E56; }

.stats-row { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; margin-bottom: 1.25rem; }
.stat-card { background: var(--color-background-secondary); border-radius: 8px; padding: 10px 12px; }
.stat-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 3px; }
.stat-val { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
.stat-sub { font-size: 11px; color: var(--color-text-tertiary); }

.water-summary { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 12px; padding: 1rem 1.125rem; margin-bottom: 1rem; }
.water-sum-row { display: flex; align-items: center; gap: 12px; }
.water-sum-main { display: flex; align-items: baseline; gap: 5px; }
.water-sum-ml { font-size: 26px; font-weight: 500; color: #0F6E56; }
.water-sum-unit { font-size: 13px; color: var(--color-text-secondary); }
.water-sum-goal { font-size: 12px; color: var(--color-text-tertiary); }
.water-track { flex: 1; }
.water-full-bar { height: 8px; background: var(--color-background-secondary); border-radius: 99px; overflow: hidden; }
.water-full-fill { height: 100%; background: #1D9E75; border-radius: 99px; transition: width 0.3s; }
.water-cups-row { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
.wcup-sm { width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid var(--color-border-secondary); display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; background: transparent; transition: all 0.12s; }
.wcup-sm.on { background: #E1F5EE; border-color: #1D9E75; }
.warm-cup { width: 40px; height: 40px; border-radius: 8px; border: 2px solid #BA7517; background: #FAEEDA; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: all 0.12s; flex-shrink: 0; }
.warm-cup.on { background: #BA7517; }
.warm-cup-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.warm-cup-lbl { font-size: 10px; color: #854F0B; font-weight: 500; }
.warm-cup.on + .warm-cup-lbl { color: #633806; }

.section { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 12px; padding: 1rem 1.125rem; margin-bottom: 1rem; }
.sec-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.sec-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); display: flex; align-items: center; gap: 7px; }
.sec-icon { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
.i-meal { background: #EAF3DE; }
.i-ex { background: #E6F1FB; }
.i-water { background: #E1F5EE; }
.i-body { background: #EEEDFE; }
.i-squat { background: #FAEEDA; }
.i-must { background: #FBEAF0; }
.prog-txt { font-size: 12px; color: var(--color-text-secondary); }

.check-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 0.5px solid var(--color-border-tertiary); cursor: pointer; user-select: none; }
.check-item:last-child { border-bottom: none; padding-bottom: 0; }
.check-item:first-child { padding-top: 0; }
.check-item.off { cursor: default; opacity: 0.38; }
.chkbox { width: 19px; height: 19px; border-radius: 5px; border: 1.5px solid var(--color-border-secondary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.12s; }
.chkbox.on { background: #D4537E; border-color: #D4537E; }
.chkbox.on::after { content:''; display:block; width:4px; height:8px; border:2px solid white; border-top:none; border-left:none; transform:rotate(45deg) translate(-1px,-1px); }
.chkbox.green.on { background: #1D9E75; border-color: #1D9E75; }
.item-lbl { font-size: 13px; color: var(--color-text-primary); flex: 1; line-height: 1.4; }
.item-lbl.done { color: var(--color-text-tertiary); text-decoration: line-through; }
.badge { font-size: 11px; padding: 2px 7px; border-radius: 99px; flex-shrink: 0; }
.b-wd { background: #E6F1FB; color: #0C447C; }
.b-mix { background: #EEEDFE; color: #3C3489; }
.b-off { background: var(--color-background-secondary); color: var(--color-text-tertiary); }
.b-must { background: #FBEAF0; color: #72243E; }

.prog-bar-wrap { height: 3px; background: var(--color-background-secondary); border-radius: 99px; overflow: hidden; margin-top: 8px; }
.prog-bar { height: 100%; background: #1D9E75; border-radius: 99px; transition: width 0.3s; }
.prog-bar.pink { background: #D4537E; }

.squat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.squat-block { width: 100%; aspect-ratio: 1.4; border-radius: 8px; border: 1.5px solid var(--color-border-secondary); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; background: transparent; transition: all 0.12s; gap: 2px; }
.squat-block.on { background: #FAEEDA; border-color: #BA7517; }
.squat-num { font-size: 13px; font-weight: 500; color: var(--color-text-tertiary); }
.squat-block.on .squat-num { color: #633806; }
.squat-icon { font-size: 15px; }
.squat-lbl { font-size: 11px; color: var(--color-text-tertiary); margin-top: 5px; text-align: center; }

.meal-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.meal-slot label { font-size: 11px; color: var(--color-text-secondary); font-weight: 500; display: block; margin-bottom: 3px; }
.meal-slot textarea, .snack-input { border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; padding: 6px 8px; font-size: 12px; font-family: var(--font-sans); color: var(--color-text-primary); background: var(--color-background-primary); width: 100%; resize: none; }
.meal-slot textarea:focus, .snack-input:focus { outline: none; border-color: var(--color-border-primary); }
.body-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.body-field label { font-size: 12px; color: var(--color-text-secondary); display: block; margin-bottom: 5px; }
.body-field-row { display: flex; align-items: center; gap: 6px; }
.body-field input { border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; padding: 7px 10px; font-size: 15px; font-family: var(--font-sans); color: var(--color-text-primary); background: var(--color-background-primary); width: 100%; }
.body-field input:focus { outline: none; border-color: #1D9E75; }
.body-unit { font-size: 13px; color: var(--color-text-secondary); white-space: nowrap; }
.body-diff { font-size: 12px; font-weight: 500; margin-top: 4px; }
.diff-down { color: #1D9E75; }
.diff-up { color: #E24B4A; }
.diff-zero { color: var(--color-text-tertiary); }
.note-area { width:100%; border:0.5px solid var(--color-border-tertiary); border-radius:8px; padding:8px 10px; font-size:13px; font-family:var(--font-sans); color:var(--color-text-primary); background:var(--color-background-primary); resize:none; min-height:56px; }
.note-area:focus { outline:none; border-color:var(--color-border-primary); }
.chart-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.chart-title { font-size:14px; font-weight:500; color:var(--color-text-primary); }
.chart-legend { display:flex; gap:14px; font-size:12px; color:var(--color-text-secondary); margin-top:6px; }
.leg-dot { width:10px; height:10px; border-radius:2px; display:inline-block; margin-right:4px; vertical-align:middle; }
.range-btns { display:flex; gap:4px; }
.range-btn { padding:3px 10px; font-size:12px; border-radius:6px; border:0.5px solid var(--color-border-secondary); background:transparent; cursor:pointer; color:var(--color-text-secondary); font-family:var(--font-sans); }
.range-btn.active { background:#E1F5EE; border-color:#1D9E75; color:#0F6E56; }
</style>

<div class="wrap">
  <div class="header">
    <div class="title">나의 다이어트 루틴</div>
    <div class="date-nav">
      <button class="nav-btn" onclick="changeDay(-1)">&#8249;</button>
      <span class="date-label" id="date-label"></span>
      <button class="nav-btn" onclick="changeDay(1)">&#8250;</button>
      <button class="today-btn" onclick="goToday()">오늘</button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('daily',this)">오늘 기록</button>
    <button class="tab" onclick="switchTab('graph',this)">몸무게·체지방 그래프</button>
  </div>

  <div id="page-daily" class="page active">
    <div class="week-strip" id="week-strip"></div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">운동</div>
        <div class="stat-val" id="s-ex">-</div>
        <div class="stat-sub">항목 완료</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">스쿼트</div>
        <div class="stat-val" id="s-squat">0<span style="font-size:12px;font-weight:400">/100</span></div>
        <div class="stat-sub">개</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">몸무게</div>
        <div class="stat-val" id="s-weight">-</div>
        <div class="stat-sub">kg</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">달성률</div>
        <div class="stat-val" id="s-pct">0<span style="font-size:12px;font-weight:400">%</span></div>
        *
